<section id="sec-settings" class="p-6 animate-fade-in hidden">
  <div class="flex items-center justify-between mb-5 gap-3 flex-wrap">
    <div>
      <h1 class="text-xl font-bold text-white">Settings</h1>
      <p class="text-xs text-gray-500 mt-0.5">Pengaturan token cron untuk Blast</p>
    </div>
    <button onclick="loadSettingsSection()" class="flex items-center gap-1.5 text-xs text-gray-500 hover:text-green-400 border border-slate-700/50 hover:border-green-800/40 px-3 py-1.5 rounded-lg transition-all">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Refresh
    </button>
  </div>

  <div class="card rounded-xl border border-slate-700/40 p-5 max-w-2xl">
    <h2 class="text-sm font-semibold text-white mb-3">Blast Cron Token</h2>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-500 block mb-1">Token <span class="text-red-400">*</span></label>
        <input id="settings-blast-token" type="text" placeholder="Masukkan token cron" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white font-mono"/>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="saveSettingsSection()" class="btn-primary px-4 py-2 rounded-lg text-xs font-semibold">Simpan</button>
        <button onclick="copySettingsCronUrl()" class="px-3 py-2 rounded-lg text-xs font-semibold border border-slate-700/50 text-gray-400 hover:text-white hover:border-slate-600 transition-all">Copy Cron URL</button>
      </div>
      <div>
        <p class="text-xs text-gray-500 mb-1">Cron URL backend:</p>
        <code id="settings-cron-url" class="block bg-slate-900 rounded-lg px-3 py-2 text-xs text-green-300 font-mono break-all"></code>
      </div>
      <p class="text-xs text-gray-600">URL ini dipakai untuk eksekusi cron blast eksternal.</p>
    </div>
  </div>
</section>
