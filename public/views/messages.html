<section id="sec-messages" class="animate-fade-in hidden flex" style="height:calc(100vh - 56px)">

  <!-- ── Left pane: conversation list ─────────────────────────────────── -->
  <div class="flex-shrink-0 flex flex-col border-r border-slate-700/50 bg-surface-900" style="width:288px;min-width:200px">

    <!-- Search + refresh -->
    <div class="flex items-center gap-2 px-3 py-2.5 border-b border-slate-700/40 flex-shrink-0">
      <div class="flex-1 relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="inbox-search" type="text" placeholder="Search conversations…" oninput="inboxSearch()"
          class="input-field w-full pl-7 pr-2 py-1.5 rounded-lg text-xs text-white placeholder-gray-600"/>
      </div>
      <button onclick="loadInbox()" title="Refresh"
        class="w-6 h-6 flex-shrink-0 flex items-center justify-center text-gray-500 hover:text-green-400 transition-colors rounded">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
    </div>

    <!-- Device filter -->
    <div class="px-3 py-2 border-b border-slate-700/40 flex-shrink-0">
      <select id="inbox-device-sel" onchange="loadInbox()"
        class="input-field w-full px-2.5 py-1.5 rounded-lg text-xs text-white">
        <option value="">All devices</option>
      </select>
    </div>

    <!-- Conversation list -->
    <div id="inbox-list" class="flex-1 overflow-y-auto">
      <div class="text-xs text-gray-600 text-center py-12">Loading…</div>
    </div>
  </div>

  <!-- ── Right pane: chat view ─────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0 bg-surface-900">

    <!-- Empty state -->
    <div id="inbox-empty" class="flex-1 flex flex-col items-center justify-center gap-4 px-8 text-center">
      <div class="w-16 h-16 rounded-2xl bg-green-900/20 border border-green-800/30 flex items-center justify-center">
        <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
      </div>
      <div>
        <div class="text-sm font-semibold text-white mb-1">Inbox</div>
        <div class="text-xs text-gray-500">Select a conversation to view messages</div>
      </div>
    </div>

    <!-- Chat header (shown when conversation open) -->
    <div id="inbox-chat-header" class="hidden flex-shrink-0 flex items-center gap-3 px-4 py-2.5 border-b border-slate-700/40 bg-slate-900/60">
      <div id="inbox-chat-avatar"
        class="w-9 h-9 rounded-full bg-gradient-to-br from-green-800/50 to-teal-800/50 border border-green-800/30 flex items-center justify-center text-xs font-bold text-green-300 flex-shrink-0">?</div>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold text-white truncate" id="inbox-chat-name">—</div>
        <div class="text-[11px] text-gray-500 truncate" id="inbox-chat-sub"></div>
      </div>
      <button onclick="loadInboxMsgs(inboxState.activeContact, inboxState.activeDevice)"
        title="Refresh chat" class="w-7 h-7 flex items-center justify-center rounded-lg border border-slate-700/50 text-gray-500 hover:text-green-400 transition-all flex-shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
    </div>

    <!-- Message bubbles -->
    <div id="inbox-chat-msgs" class="hidden flex-1 overflow-y-auto px-3 py-3"
      style="background-color:var(--bg);background-image:radial-gradient(circle at 1px 1px,rgba(127,127,127,.04) 1px,transparent 0);background-size:24px 24px;">
    </div>

    <!-- Compose bar -->
    <div id="inbox-chat-compose" class="hidden flex-shrink-0 flex items-end gap-2 px-4 py-3 border-t border-slate-700/40 bg-slate-900/60">
      <input id="inbox-media-file" type="file" class="hidden" onchange="inboxHandleFilePicked(event)" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.webp" />
      <button type="button" onclick="inboxPickFile()"
        class="flex-shrink-0 w-9 h-9 rounded-xl border border-slate-700/50 text-gray-500 hover:text-green-400 transition-colors flex items-center justify-center">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828L18 9.828a4 4 0 10-5.657-5.657L5.757 10.757a6 6 0 108.486 8.486L20.5 13"/></svg>
      </button>
      <div class="relative flex-shrink-0">
        <button type="button" onclick="toggleInboxEmojiPicker()"
          class="flex-shrink-0 w-9 h-9 rounded-xl border border-slate-700/50 text-gray-500 hover:text-yellow-400 transition-colors flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828A4 4 0 019.172 9.172m9.656 5.656A9 9 0 1112 3a9 9 0 018.485 6"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10h.01M15 10h.01"/></svg>
        </button>
        <div id="inbox-emoji-picker" class="hidden absolute bottom-12 left-0 w-72 rounded-2xl border border-slate-700/40 bg-slate-900/95 backdrop-blur-md shadow-2xl p-3 z-20">
          <div class="text-[11px] text-gray-500 mb-2 px-1">Emoji</div>
          <div id="inbox-emoji-grid" class="grid grid-cols-8 gap-1 max-h-56 overflow-y-auto"></div>
        </div>
      </div>
      <textarea id="inbox-msg-body" rows="1" placeholder="Type a message…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();inboxSend();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px'"
        class="input-field flex-1 px-3 py-2 rounded-xl text-sm text-white placeholder-gray-600 resize-none leading-snug"></textarea>
      <button onclick="inboxSend()"
        class="flex-shrink-0 w-9 h-9 rounded-xl bg-green-600 hover:bg-green-500 transition-colors flex items-center justify-center shadow-md">
        <svg class="w-4 h-4" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M22 41L32 21L42 41L32 38.5L22 41Z" stroke="#0f172a" stroke-width="5" stroke-linejoin="round"/>
          <path d="M32 22V39" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="inbox-reply-preview" class="hidden flex-shrink-0 px-4 pb-3 -mt-1">
      <div class="w-full rounded-xl border border-slate-700/40 bg-slate-900/50 px-3 py-2 flex items-start gap-3">
        <div class="w-1 self-stretch rounded-full bg-green-500/80"></div>
        <div class="flex-1 min-w-0">
          <div id="inbox-reply-title" class="text-[11px] font-semibold text-green-400">Replying</div>
          <div id="inbox-reply-body" class="text-xs text-gray-300 truncate">—</div>
        </div>
        <button type="button" onclick="clearInboxReply()" class="w-7 h-7 rounded-lg border border-slate-700/50 text-gray-500 hover:text-red-400 flex items-center justify-center transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div id="inbox-media-preview" class="hidden flex-shrink-0 px-4 pb-3 -mt-1">
      <div class="w-full rounded-xl border border-slate-700/40 bg-slate-900/50 px-3 py-2 flex items-center gap-3">
        <div class="flex-1 min-w-0">
          <div id="inbox-media-name" class="text-xs font-medium text-white truncate">—</div>
          <div id="inbox-media-meta" class="text-[11px] text-gray-500">—</div>
        </div>
        <span id="inbox-media-mode" class="hidden text-[10px] text-yellow-400 border border-yellow-800/40 rounded-full px-2 py-0.5">Sticker</span>
        <button type="button" onclick="inboxClearPickedFile()" class="w-7 h-7 rounded-lg border border-slate-700/50 text-gray-500 hover:text-red-400 flex items-center justify-center transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="inbox-image-modal" class="hidden fixed inset-0 z-[80] bg-black/80 backdrop-blur-sm">
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="relative max-w-[92vw] max-h-[92vh] flex flex-col items-center">
        <div class="absolute top-3 right-3 flex items-center gap-2 z-10">
          <button type="button" onclick="inboxZoomImage(-0.2)" class="w-11 h-11 rounded-xl bg-white/95 text-slate-900 border border-slate-300 shadow-xl flex items-center justify-center text-xl font-black hover:bg-white transition-colors">−</button>
          <button type="button" onclick="inboxZoomImage(0.2)" class="w-11 h-11 rounded-xl bg-white/95 text-slate-900 border border-slate-300 shadow-xl flex items-center justify-center text-xl font-black hover:bg-white transition-colors">+</button>
          <button type="button" onclick="closeInboxImageModal()" class="w-11 h-11 rounded-xl bg-red-500/95 text-white border border-red-300 shadow-xl flex items-center justify-center text-xl font-black hover:bg-red-500 transition-colors">×</button>
        </div>
        <div class="overflow-auto max-w-[92vw] max-h-[92vh] rounded-2xl">
          <img id="inbox-image-modal-img" src="" alt="Preview" class="origin-center transition-transform duration-150 max-w-none" style="transform:scale(1);" />
        </div>
      </div>
    </div>
  </div>

</section>
