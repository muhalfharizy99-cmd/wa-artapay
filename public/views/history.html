<section id="sec-history" class="p-6 animate-fade-in hidden">
  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-xl font-bold text-white">Message History</h1>
      <p class="text-sm text-gray-500">Incoming &amp; outgoing messages stored in database</p>
    </div>
    <button onclick="loadHistory(true)" class="flex items-center gap-1.5 text-xs text-gray-500 hover:text-green-400 border border-slate-700/50 hover:border-green-800/40 px-3 py-1.5 rounded-lg transition-all">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Refresh
    </button>
  </div>

  <!-- Filters -->
  <div class="card rounded-xl border border-slate-700/40 p-4 mb-4">
    <div class="flex items-center gap-3 flex-wrap">
      <div class="flex items-center gap-1.5 border border-slate-700/50 rounded-lg overflow-hidden">
        <button id="hist-filter-all" onclick="setHistFilter('all')" class="px-3 py-1.5 text-xs font-medium text-white bg-slate-700/60 transition-all">All</button>
        <button id="hist-filter-in"  onclick="setHistFilter('in')"  class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-blue-400 transition-all">Received</button>
        <button id="hist-filter-out" onclick="setHistFilter('out')" class="px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-purple-400 transition-all">Sent</button>
      </div>
      <select id="hist-device-filter" onchange="setHistDeviceFilter(this.value)" class="input-field px-3 py-1.5 rounded-lg text-xs text-white min-w-[180px]">
        <option value="">All devices</option>
      </select>
      <input id="hist-search" type="text" placeholder="Search number or message..." onkeyup="histSearchDebounce()" class="input-field flex-1 min-w-0 px-3 py-1.5 rounded-lg text-xs text-white placeholder-gray-600"/>
      <span id="hist-total-badge" class="text-xs text-gray-500 flex-shrink-0"></span>
    </div>
  </div>

  <!-- Table -->
  <div class="card rounded-xl border border-slate-700/40 overflow-hidden">
    <div id="hist-table-header" class="grid grid-cols-12 gap-2 px-4 py-2.5 text-xs text-gray-500 font-semibold uppercase tracking-wider border-b border-slate-700/40 bg-black/20">
      <div class="col-span-1">Dir</div>
      <div class="col-span-3">From / To</div>
      <div class="col-span-6">Message</div>
      <div class="col-span-2 text-right">Time</div>
    </div>
    <div id="hist-list" class="divide-y divide-slate-700/30">
      <div class="text-xs text-gray-600 text-center py-10 animate-pulse">Loading...</div>
    </div>
  </div>

  <!-- Pagination -->
  <div id="hist-pagination" class="flex items-center justify-between mt-4 hidden">
    <span id="hist-page-info" class="text-xs text-gray-500"></span>
    <div class="flex items-center gap-2">
      <button id="hist-prev" onclick="histChangePage(-1)" class="px-3 py-1.5 rounded-lg text-xs border border-slate-700/50 text-gray-400 hover:text-white hover:border-slate-500 transition-all disabled:opacity-40 disabled:cursor-not-allowed">← Prev</button>
      <button id="hist-next" onclick="histChangePage(1)"  class="px-3 py-1.5 rounded-lg text-xs border border-slate-700/50 text-gray-400 hover:text-white hover:border-slate-500 transition-all disabled:opacity-40 disabled:cursor-not-allowed">Next →</button>
    </div>
  </div>
</section>
