<div class="blast-subpage space-y-4">
  <div class="flex items-center justify-between mb-3 gap-3 flex-wrap">
    <div>
      <h2 class="text-sm font-semibold text-white">Blast Logs</h2>
      <p class="text-xs text-gray-500 mt-0.5">Monitor hasil pengiriman dan status campaign</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="blast-logs-back-btn" onclick="backToBlastCampaigns()" class="hidden px-3 py-1.5 rounded-lg text-xs font-semibold border border-slate-700/50 text-gray-300 hover:text-white hover:border-slate-600 transition-all flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back ke Campaign
      </button>
      <select id="blast-logs-filter" onchange="loadBlastLogs()" class="input-field px-3 py-1.5 rounded-lg text-xs text-white">
        <option value="">Semua Campaign</option>
      </select>
    </div>
  </div>

  <div id="blast-logs-campaign-summary" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3"></div>
  <h3 class="text-xs font-semibold text-white mb-2">Ringkasan Campaign</h3>
  <div class="card rounded-xl border border-slate-700/40 p-3 mb-3 overflow-x-auto">
    <table class="w-full text-left">
      <thead class="text-[11px] text-gray-400 border-b border-slate-700/40">
        <tr>
          <th class="py-2 pr-3 font-medium">Campaign</th>
          <th class="py-2 pr-3 font-medium">Status</th>
          <th class="py-2 pr-3 font-medium">Sent</th>
          <th class="py-2 pr-3 font-medium">Failed</th>
          <th class="py-2 pr-3 font-medium">Pending</th>
          <th class="py-2 pr-0 font-medium">Success Rate</th>
        </tr>
      </thead>
      <tbody id="blast-logs-campaign-list" class="text-xs">
        <tr><td colspan="6" class="py-4 text-center text-gray-500">Memuat daftar campaign...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="card rounded-xl border border-slate-700/40 p-4">
    <div id="blast-logs-list" class="space-y-2 max-h-96 overflow-y-auto">
      <div class="text-xs text-gray-500 text-center py-8">Pilih campaign untuk melihat logs</div>
    </div>
  </div>
</div>
