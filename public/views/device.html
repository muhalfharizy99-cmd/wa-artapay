<section id="sec-device" class="p-6 animate-fade-in hidden">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-white">Device Management</h1>
      <p class="text-sm text-gray-500">WhatsApp sessions &amp; per-device API keys</p>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="openAddDeviceModal()" class="btn-primary px-4 py-2 rounded-lg text-xs font-semibold flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Device
      </button>
    </div>
  </div>

  <!-- Check Number -->
  <div class="card rounded-xl border border-slate-700/50 p-4 mb-5">
    <div class="flex items-center gap-3">
      <span class="text-xs text-gray-400 font-semibold whitespace-nowrap">Check Number</span>
      <input id="check-number-input" type="text" placeholder="628xxxxxxxx" class="input-field flex-1 px-3 py-1.5 rounded-lg text-sm text-white placeholder-gray-600" />
      <button onclick="checkNumber()" class="btn-primary px-4 py-1.5 rounded-lg text-xs font-semibold text-white whitespace-nowrap">Check WA</button>
      <div id="check-result" class="hidden"></div>
    </div>
  </div>

  <!-- Devices Grid -->
  <div id="devices-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div class="text-xs text-gray-600 text-center py-8 col-span-2">Loading devices...</div>
  </div>
</section>
